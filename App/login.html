    <script>
        const remote = require('electron').remote;
        let window = remote.getCurrentWindow();

        function appMinimize() {
            window.minimize();
        }

        function appExit() {
            window.close();
        }
    </script>

        <h2>Virtual Airline Login</h2>
        <p class="loginOption">Airline</p>
        <select class="optionInput" style="width: 502px; padding-left: 0px; padding-right: 0px;">
            <option>GTI - Atlas Air Virtual (phpVMS 5)</option>
            <option>AAA - Estafeta Virtual (phpVMS 7)</option>
        </select>
        <p class="loginOption">Airline ID</p>
        <input class="optionInput" placeholder="ABC0123">
        <p class="loginOption">Password/API Key</p>
        <input class="optionInput" type="password">
        <br>
        <p style="margin: 0;"><input type="checkbox">Remember me?</p>
        <button class="nextButton">Login</button>
